<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Auto Ballooning &amp; inspection report Software System</title>
  <link rel="stylesheet" href="/assets/style.css?v=10" />
  <link rel="stylesheet" href="/assets/auth.css?v=1" />
</head>
<body class="auth-body">
  <div class="auth-card wide">
    <h1>Admin</h1>
    <p class="auth-hint">Mark users as paid to restore access after trial.</p>
    <div id="msg" class="auth-msg"></div>
    <div class="table-wrap">
      <table id="userTable">
        <thead>
          <tr><th>Email</th><th>Role</th><th>Paid</th><th>Trial started</th></tr>
        </thead>
        <tbody id="userBody"></tbody>
      </table>
    </div>
    <div class="admin-row">
      <input type="email" id="paidEmail" placeholder="user@gmail.com" />
      <button type="button" id="btnPaid" class="primary">Mark paid</button>
    </div>
    <p><a href="/app">← Back to app</a></p>
  </div>
  <script src="/assets/admin.js?v=1"></script>
</body>
</html>
