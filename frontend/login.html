<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Auto Ballooning &amp; inspection report Software System</title>
  <link rel="stylesheet" href="/assets/style.css?v=10" />
  <link rel="stylesheet" href="/assets/auth.css?v=3" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="login-brand">
      <img src="/assets/smorx-logo.png" alt="SmorX.ai" />
      <h1>Auto Ballooning &amp; inspection report Software System</h1>
    </div>
    <div id="msg" class="auth-msg"></div>
    <label>Login through email</label>
    <input type="email" id="email" autocomplete="username" placeholder="you@gmail.com" />
    <label>Password</label>
    <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" />
    <div class="auth-actions">
      <button type="button" id="btnLogin" class="primary">Login</button>
      <button type="button" id="btnRegister" class="btn-secondary">Create account</button>
    </div>
    <p class="auth-small">Trial: 3 days from first successful login.</p>
  </div>
  <script src="/assets/login.js?v=5"></script>
</body>
</html>
