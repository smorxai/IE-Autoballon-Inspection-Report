services:
  # ── Backend — Python Web Service ─────────────────────────────────────────
  # Render dashboard: New → Web Service → connect repo → set Root Directory = backend
  - type: web
    name: autoballon-backend
    runtime: python
    rootDir: backend
    buildCommand: >-
      apt-get install -y tesseract-ocr poppler-utils &&
      git lfs install && git lfs pull &&
      pip install --upgrade pip &&
      pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.11"
      - key: BALLOON_USE_BUNDLED_UI
        value: "1"
      - key: BALLOON_RENDER_SAFE
        value: "1"
      - key: BALLOON_OCR_ENGINE
        value: tesseract
      - key: BALLOON_MAX_CROP_OCR
        value: "40"

      # Set BALLOON_CORS_ORIGINS to your frontend Render URL, e.g.:
      # https://autoballon-frontend.onrender.com
      - key: BALLOON_CORS_ORIGINS
        sync: false

      # Required secrets — set in Render dashboard Environment tab
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

  # ── Frontend — Static Site ────────────────────────────────────────────────
  # Render dashboard: New → Static Site → connect repo → set Publish Directory = frontend
  # IMPORTANT: edit frontend/_redirects and replace YOUR-BACKEND with the
  # actual backend service URL (e.g. https://autoballon-backend.onrender.com)
  - type: web
    name: autoballon-frontend
    env: static
    buildCommand: ""
    staticPublishPath: ./frontend
